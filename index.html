<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chấm Công Đội Khoán</title>
    <!-- Google Fonts: Outfit cho tiêu đề, Inter cho nội dung -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- HEADER -->
        <header class="premium-header">
            <div class="header-top">
                <div class="brand">
                    <div class="brand-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
                    </div>
                    <h1>ProTime</h1>
                </div>
                <div class="role-selector-wrap">
                    <select id="role-select" onchange="app.changeRole(this.value)">
                        <option value="LEADER">Đội Trưởng</option>
                        <option value="SUPERVISOR">Giám Sát</option>
                        <option value="PM">Quản Lý</option>
                    </select>
                </div>
            </div>
            
            <div id="daily-status-banner" class="status-banner pending">
                <div class="status-dot"></div>
                <span id="daily-status-text">Chưa gửi</span>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main id="main-content">
            
            <!-- PAGE 1: CHẤM CÔNG THƯỜNG NGÀY -->
            <section id="page-daily" class="page active">
                <div class="sticky-toolbar">
                    <div class="date-picker-wrap">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        <input type="date" id="date-picker-daily" class="date-input-borderless" onchange="app.changeDate(this.value)">
                    </div>
                    <button class="btn btn-tick-all action-leader-only" onclick="app.selectAllDaily(8)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        Tick tất cả 8h
                    </button>
                </div>

                <!-- Thanh thống kê sĩ số -->
                <div class="stats-row" id="daily-stats">
                    <!-- JS sẽ điền số lượng -->
                </div>

                <div class="list-container" id="daily-list">
                    <!-- JS render danh sách -->
                </div>
                <div class="bottom-action action-leader-only">
                    <button class="btn btn-primary large shadow-glow" onclick="app.submitDaily()">
                        Gửi Bảng Công
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </section>

            <!-- PAGE 2: CHẤM CÔNG TĂNG CA -->
            <section id="page-overtime" class="page">
                <div class="sticky-toolbar">
                    <div class="date-picker-wrap read-only">
                        <span id="current-date-display-ot">...</span>
                    </div>
                    <span class="ot-hint">Chỉ người có mặt</span>
                </div>
                <div class="list-container" id="ot-list">
                    <!-- JS render danh sách tăng ca -->
                </div>
                <div class="bottom-action action-leader-only">
                    <button class="btn btn-primary large shadow-glow" onclick="app.submitOT()">Cập Nhật Tăng Ca</button>
                </div>
            </section>

            <!-- PAGE 3: TỔNG HỢP LƯƠNG -->
            <section id="page-summary" class="page">
                <div class="summary-header-card">
                    <h2 class="outfit-font">Kỳ thanh toán</h2>
                    <div class="date-range-premium">
                        <input type="date" id="summary-start" onchange="app.renderSummary()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        <input type="date" id="summary-end" onchange="app.renderSummary()">
                    </div>
                </div>

                <div class="total-amount-box">
                    <div class="glass-overlay"></div>
                    <span>TỔNG TIỀN THANH TOÁN</span>
                    <h2 class="outfit-font" id="sum-total-amount">0 đ</h2>
                    <div class="mini-stats">
                        <div>Thường: <strong id="sum-regular-hours">0</strong>h</div>
                        <div class="divider"></div>
                        <div>Tăng ca: <strong id="sum-ot-hours">0</strong>h</div>
                    </div>
                </div>

                <div class="approval-actions" id="summary-approval-box">
                    <div class="approval-status-chip">
                        Trạng thái ngày đang chọn: <strong id="summary-status-text">Chờ duyệt</strong>
                    </div>
                    <div class="btn-group-center mt-3">
                        <button id="btn-reject-supervisor" class="btn btn-danger action-supervisor-only" onclick="app.rejectBySupervisor()">Trả Về Sửa</button>
                        <button id="btn-approve-supervisor" class="btn btn-warning action-supervisor-only" onclick="app.approveBySupervisor()">Duyệt Bảng Công</button>
                        <button id="btn-approve-pm" class="btn btn-success action-pm-only" onclick="app.approveByPM()">Chốt Thanh Toán</button>
                    </div>
                </div>

                <div class="list-container" id="summary-list">
                    <!-- JS render chi tiết -->
                </div>
            </section>

        </main>

        <!-- BOTTOM NAVIGATION -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="app.switchTab('page-daily', this)">
                <div class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg></div>
                <span>Hành chính</span>
            </button>
            <button class="nav-item" onclick="app.switchTab('page-overtime', this)">
                <div class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></div>
                <span>Tăng ca</span>
            </button>
            <button class="nav-item" onclick="app.switchTab('page-summary', this)">
                <div class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg></div>
                <span>Tổng hợp</span>
            </button>
        </nav>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
