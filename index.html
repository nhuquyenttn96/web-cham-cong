<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chấm Công Đội Khoán</title>
    
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <!-- LOGIN OVERLAY -->
    <div id="login-overlay" class="modal-overlay active">
        <div class="login-card">
            <div class="brand" style="justify-content:center; margin-bottom: 20px;">
                <div class="brand-icon" style="width:40px;height:40px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 style="font-size:2rem;">HIREE</h1>
            </div>
            <h2 class="outfit-font" style="text-align:center; margin-bottom: 20px;">Đăng Nhập</h2>
            
            <div class="form-group">
                <label>Vai trò</label>
                <select id="login-role" class="input-modern">
                    <option value="LEADER">Đội Trưởng</option>
                    <option value="SUPERVISOR">Giám Sát</option>
                    <option value="PM">Quản Lý (PM)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Mã PIN</label>
                <input type="password" id="login-pin" class="input-modern" placeholder="Nhập mã PIN (vd: 1111)">
            </div>
            <button class="btn btn-primary large shadow-glow" style="width:100%" onclick="app.login()">Vào Ứng Dụng</button>
        </div>
    </div>

    <!-- WORKER MANAGEMENT MODAL -->
    <div id="worker-modal" class="modal-overlay">
        <div class="login-card" style="max-width: 500px; max-height: 90vh; overflow-y: auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                <h2 class="outfit-font">Quản lý Nhân Sự</h2>
                <button class="btn-icon" onclick="app.closeWorkerModal()">✕</button>
            </div>
            
            <div class="add-worker-form">
                <input type="text" id="new-worker-name" class="input-modern" placeholder="Tên công nhân" style="margin-bottom: 10px;">
                <div style="display:flex; gap: 10px; margin-bottom: 10px;">
                    <select id="new-worker-role" class="input-modern" style="flex:1;">
                        <option value="Thợ chính">Thợ chính</option>
                        <option value="Thợ phụ">Thợ phụ</option>
                    </select>
                    <input type="number" id="new-worker-wage" class="input-modern" placeholder="Lương (VNĐ/h)" style="flex:1;" value="50000">
                </div>
                <button class="btn btn-primary shadow-glow" style="width:100%; margin-bottom: 20px;" onclick="app.addWorker()">+ Thêm Người</button>
            </div>

            <!-- EXCEL IMPORT (PM ONLY) -->
            <div class="action-pm-only" style="width:100%;">
                <div style="width:100%; display:flex; flex-direction:column; gap: 10px; margin-bottom: 20px; padding: 15px; background: #f8fafc; border-radius: 12px; border: 1px dashed #cbd5e1; box-sizing:border-box;">
                    <h3 style="font-size:0.9rem; color:var(--primary-dark); margin:0;">Nhập từ Excel (Chỉ Quản lý)</h3>
                    <div style="display:flex; gap: 10px;">
                        <button class="btn" style="flex:1; background: white; border: 1px solid #cbd5e1; color: var(--text-main);" onclick="app.downloadTemplate()">Tải File Mẫu</button>
                        <button class="btn btn-success" style="flex:1;" onclick="document.getElementById('excel-upload').click()">Nhập Excel</button>
                        <input type="file" id="excel-upload" accept=".xlsx, .xls" style="display:none;" onchange="app.importExcel(event)">
                    </div>
                </div>
            </div>

            <div class="worker-list-scrollable" id="settings-worker-list" style="max-height: 300px; overflow-y:auto; border-top: 1px solid #e2e8f0; padding-top: 10px;">
                <!-- JS Render -->
            </div>
        </div>
    </div>

    <div id="app" style="display:none;">
        <!-- HEADER -->
        <header class="premium-header">
            <div class="header-top">
                <div class="brand">
                    <div class="brand-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
                    </div>
                    <h1>HIREE</h1>
                </div>
                <div class="header-actions" style="display:flex; gap: 10px;">
                    <button class="btn-icon action-pm-only" onclick="app.openWorkerModal()" title="Cài đặt">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    </button>
                    <button class="btn-icon" onclick="app.logout()" title="Đăng xuất">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
            </div>
            
            <div id="daily-status-banner" class="status-banner pending">
                <div class="status-dot"></div>
                <span id="daily-status-text">Chưa gửi</span>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main id="main-content">
            
            <!-- PAGE 1: CHẤM CÔNG THƯỜNG NGÀY -->
            <section id="page-daily" class="page active">
                <div class="sticky-toolbar">
                    <div class="date-picker-wrap">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        <input type="date" id="date-picker-daily" class="date-input-borderless" onchange="app.changeDate(this.value)">
                    </div>
                    <button class="btn btn-tick-all action-leader-only" onclick="app.selectAllDaily(8)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        Tick tất cả 8h
                    </button>
                </div>

                <div class="stats-row" id="daily-stats">
                    <!-- JS sẽ điền số lượng -->
                </div>

                <div class="list-container" id="daily-list">
                    <!-- JS render danh sách -->
                </div>
                <div class="bottom-action action-leader-only" id="daily-action-box">
                    <button class="btn btn-primary large shadow-glow" onclick="app.submitDaily()">
                        Gửi Bảng Công
                    </button>
                </div>
            </section>

            <!-- PAGE 2: CHẤM CÔNG TĂNG CA -->
            <section id="page-overtime" class="page">
                <div class="sticky-toolbar">
                    <div class="date-picker-wrap read-only">
                        <span id="current-date-display-ot">...</span>
                    </div>
                    <span class="ot-hint">Chỉ người có mặt</span>
                </div>
                <div class="list-container" id="ot-list">
                    <!-- JS render danh sách tăng ca -->
                </div>
                <div class="bottom-action action-leader-only" id="ot-action-box">
                    <button class="btn btn-primary large shadow-glow" onclick="app.submitOT()">Cập Nhật Tăng Ca</button>
                </div>
            </section>

            <!-- PAGE 3: TỔNG HỢP LƯƠNG -->
            <section id="page-summary" class="page">
                <div class="summary-header-card">
                    <h2 class="outfit-font">Kỳ thanh toán</h2>
                    <div class="date-range-premium">
                        <input type="date" id="summary-start" onchange="app.renderSummary()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        <input type="date" id="summary-end" onchange="app.renderSummary()">
                    </div>
                </div>

                <div class="total-amount-box">
                    <div class="glass-overlay"></div>
                    <span>TỔNG TIỀN THANH TOÁN</span>
                    <h2 class="outfit-font" id="sum-total-amount">0 đ</h2>
                    <div class="mini-stats">
                        <div>Thường: <strong id="sum-regular-hours">0</strong>h</div>
                        <div class="divider"></div>
                        <div>Tăng ca: <strong id="sum-ot-hours">0</strong>h</div>
                    </div>
                </div>

                <div class="approval-actions" id="summary-approval-box">
                    <div class="approval-status-chip">
                        Trạng thái ngày đang chọn: <strong id="summary-status-text">Chờ duyệt</strong>
                    </div>
                    <div class="btn-group-center mt-3" style="flex-wrap: wrap; gap: 8px;">
                        <button id="btn-reject-supervisor" class="btn btn-danger action-supervisor-only" onclick="app.rejectBySupervisor()">Trả Về Sửa</button>
                        <button id="btn-approve-supervisor" class="btn btn-warning action-supervisor-only" onclick="app.approveBySupervisor()">Duyệt Bảng Công</button>
                        <button id="btn-approve-pm" class="btn btn-success action-pm-only" onclick="app.approveByPM()">Chốt Thanh Toán</button>
                        <button class="btn btn-excel" onclick="app.exportExcel()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px"><path d="M14 2H6a2 2 0 0 0-2 2v16c0 1.1.9 2 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/><path d="M14 3v5h5M16 13H8M16 17H8M10 9H8"/></svg>
                            Xuất Excel
                        </button>
                    </div>
                </div>

                <div class="list-container" id="summary-list">
                    <!-- JS render chi tiết -->
                </div>
            </section>

        </main>

        <!-- BOTTOM NAVIGATION -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="app.switchTab('page-daily', this)">
                <div class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg></div>
                <span>Hành chính</span>
            </button>
            <button class="nav-item" onclick="app.switchTab('page-overtime', this)">
                <div class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></div>
                <span>Tăng ca</span>
            </button>
            <button class="nav-item" onclick="app.switchTab('page-summary', this)">
                <div class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg></div>
                <span>Tổng hợp</span>
            </button>
        </nav>
    </div>
    
    <script type="module" src="app.js?v=5"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
